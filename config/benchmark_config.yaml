# Clash Royale ML Baseline Configurations

models:
  logistic_regression:
    C: 0.1
    max_iter: 1000
  random_forest:
    n_estimators: 100
    max_depth: 6
  lightgbm:
    n_estimators: 100
    max_depth: 4
    learning_rate: 0.05
  catboost:
    iterations: 100
    depth: 4
    learning_rate: 0.05
  mlp:
    hidden_layer_sizes: [64, 32]
    max_iter: 300
